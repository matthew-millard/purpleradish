app = 'purpleradish'
primary_region = 'yyz'

[build]

[deploy]
release_command = 'npm run db:migrate'

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = 'stop'
auto_start_machines = true
min_machines_running = 0

[[vm]]
size = 'shared-cpu-1x'
memory = '512mb'
cpus = 1
memory_mb = 512
